[pytest]
testpaths = tests
markers =
    unit: deterministic tests that do not call live LLMs
    integration: tests that require real Palimpsest dependencies and local model assets
    e2e: end-to-end tests that require configured live LLM credentials
    privacy: tests for logging redaction and PII boundaries
    fail_fast: tests for no-workaround/no-fallback exception behavior
    recognizer: tests for recognizer labels, checksums, allow-lists, and spans
    state: tests for anonymization mapping state and context isolation
    consumer_contract: tests for local contracts modeled after known consumers
